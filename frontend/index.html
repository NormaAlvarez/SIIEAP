<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>SIIEAP</title>

    <link rel="stylesheet" href="/frontend/css/style.css">

</head>

<body>

<header>

    <h1>SIIEAP</h1>

    <p>Sistema Inteligente de Investigación y Arquitectura Empresarial Pública</p>

</header>

<div class="container">

    <div class="card">

        <h2>Asistente Documental</h2>

        <p>
            Seleccione un documento PDF para analizar.
        </p>

        <br>

        <input
            type="file"
            id="archivo"
            accept=".pdf">

        <button onclick="enviarDocumento()">

            Analizar Documento

        </button>

        <div id="respuesta">

            Aquí aparecerá el contenido del documento.

        </div>

    </div>

</div>

<footer>

SIIEAP · Versión 0.2

</footer>

<script src="/frontend/js/app.js"></script>

</body>

</html>
